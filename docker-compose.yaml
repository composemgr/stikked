# nginx proxy address - http://172.17.0.1:60191

name: stikked
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: casjaysdevdocker/stikked:latest
    container_name: stikked-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: stikked-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - '172.17.0.1:60191:80'
    volumes:
      - './volumes/data/stikked:/data'
      - './volumes/config/stikked:/config'
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://stikked-app:80'
      - 'cloudflare.hostname=stikked.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.stikked-app.entrypoints=http'
      - 'traefik.http.routers.stikked-app-secure.tls=true'
      - 'traefik.http.routers.stikked-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.stikked-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.stikked-app.middlewares=stikked-app-https-redirect'
      - 'traefik.http.routers.stikked-app-secure.entrypoints=https'
      - 'traefik.http.routers.stikked-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.stikked-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.stikked-app-secure.service=stikked-app'
      - 'traefik.http.services.stikked-app.loadbalancer.server.port=80'
    networks:
      - stikked
      - proxy
      - cloudflare

networks:
  stikked:
    name: stikked
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
